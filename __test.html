<!DOCTYPE html><html><head><meta charset="utf-8"><title>nv test</title></head>
<body><pre id="out">running…</pre>
<iframe id="f" src="/index.html" style="width:1000px;height:700px"></iframe>
<script>
const out = document.getElementById('out');
const log = [];
function check(name, cond){ log.push((cond?'PASS':'FAIL')+' · '+name); }
const f = document.getElementById('f');
f.addEventListener('load', () => setTimeout(runTests, 2500));
function runTests(){
  try{
    const d = f.contentDocument, w = f.contentWindow;
    // 1. product add -> cart badge + toast
    const addBtn = d.querySelector('#product-row .btn');
    addBtn.click(); addBtn.click();
    const badge = d.getElementById('cart-badge');
    check('cart badge shows 2 after two adds', badge.textContent === '2' && badge.hidden === false);
    check('toast appeared on add', d.querySelectorAll('#toasts .toast').length >= 1);
    // 2. open cart drawer + has item + total
    d.getElementById('cart-btn').click();
    check('cart drawer opens', d.getElementById('cart-drawer').classList.contains('open'));
    check('cart drawer has 1 line item', d.querySelectorAll('#cart-items .cart-item').length === 1);
    check('cart total not $0', d.getElementById('cart-total').textContent !== '$0');
    // 3. qty increase then checkout clears
    d.querySelector('#cart-items [data-act="inc"]').click();
    check('qty inc -> badge 3', d.getElementById('cart-badge').textContent === '3');
    d.getElementById('cart-checkout').click();
    check('checkout clears cart (badge hidden)', d.getElementById('cart-badge').hidden === true);
    // 4. favorite toggle persists class
    const fav = d.querySelector('#meal-grid .card-fav');
    fav.click();
    check('favorite toggles active', fav.classList.contains('active'));
    check('favorite saved to localStorage', JSON.parse(w.localStorage.getItem('nv-favs')||'[]').length === 1);
    // 5. plan selection
    const planBtn = d.querySelector('.plan .btn');
    planBtn.click();
    check('plan button shows Selected', planBtn.textContent.includes('Selected'));
    // 6. auth modal open + sign in flow
    d.getElementById('signin-btn').click();
    check('auth modal opens', d.getElementById('auth-modal').classList.contains('open'));
    d.getElementById('auth-email').value = 'test@example.com';
    d.getElementById('auth-pass').value = 'secret12';
    d.getElementById('auth-form').dispatchEvent(new w.Event('submit',{cancelable:true,bubbles:true}));
    check('after sign in, nav shows user chip', !!d.querySelector('.user-chip'));
    check('user persisted', !!w.localStorage.getItem('nv-user'));
    // sign out to leave clean
    const so = d.getElementById('signout-btn'); if(so) so.click();
    // 7. footer placeholder link -> toast, no navigation
    const fl = d.querySelector('.footer-grid a[href="#"]');
    const before = w.location.hash;
    fl.click();
    check('footer link does not navigate', w.location.hash === before);
    // 8. AI small-talk response
    w.localStorage.removeItem('nv-favs');
  }catch(e){ log.push('ERROR · '+e.message+' @ '+(e.stack||'').split('\n')[1]); }
  out.textContent = 'TESTS\n'+log.join('\n');
}
</script></body></html>
